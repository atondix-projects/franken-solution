## Architecture Patterns\r
\r
### App Router Structure\r
```\r
app/\r
├── (auth)/                 # Route group for auth pages\r
│   ├── login/\r
│   │   └── page.tsx       # /login\r
│   └── register/\r
│       └── page.tsx       # /register\r
├── dashboard/\r
│   ├── layout.tsx         # Nested layout for dashboard\r
│   ├── page.tsx           # /dashboard\r
│   ├── analytics/\r
│   │   └── page.tsx       # /dashboard/analytics\r
│   └── settings/\r
│       └── page.tsx       # /dashboard/settings\r
├── api/\r
│   ├── auth/\r
│   │   └── route.ts       # API endpoint\r
│   └── users/\r
│       └── route.ts\r
├── globals.css\r
├── layout.tsx             # Root layout\r
└── page.tsx               # Home page\r
```\r
\r
### Server Components Data Fetching\r
```typescript\r
// Server Component - runs on server\r
async function UserDashboard({ userId }: { userId: string }) {\r
  // Direct database access in Server Components\r
  const user = await getUserById(userId);\r
  const posts = await getPostsByUser(userId);\r
\r
  return (\r
    <div>\r
      <UserProfile user={user} />\r
      <PostList posts={posts} />\r
      <InteractiveWidget userId={userId} /> {/* Client Component */}\r
    </div>\r
  );\r
}\r
\r
// Client Component boundary\r
'use client';\r
import { useState } from 'react';\r
\r
function InteractiveWidget({ userId }: { userId: string }) {\r
  const [data, setData] = useState(null);\r
  \r
  // Client-side interactions and state\r
  return <div>Interactive content...</div>;\r
}\r
```\r
\r
### Streaming with Suspense\r
```typescript\r
import { Suspense } from 'react';\r
\r
export default function DashboardPage() {\r
  return (\r
    <div>\r
      <h1>Dashboard</h1>\r
      <Suspense fallback={<AnalyticsSkeleton />}>\r
        <AnalyticsData />\r
      </Suspense>\r
      <Suspense fallback={<PostsSkeleton />}>\r
        <RecentPosts />\r
      </Suspense>\r
    </div>\r
  );\r
}\r
\r
async function AnalyticsData() {\r
  const analytics = await fetchAnalytics(); // Slow query\r
  return <AnalyticsChart data={analytics} />;\r
}\r
```\r
\r
## Performance Optimization Strategies\r
\r
### Static Generation with Dynamic Segments\r
```typescript\r
// Generate static params for dynamic routes\r
export async function generateStaticParams() {\r
  const posts = await getPosts();\r
  return posts.map((post) => ({\r
    slug: post.slug,\r
  }));\r
}\r
\r
// Static generation with ISR\r
export const revalidate = 3600; // Revalidate every hour\r
\r
export default async function PostPage({ params }: { params: { slug: string } }) {\r
  const post = await getPost(params.slug);\r
  return <PostContent post={post} />;\r
}\r
```\r
\r
### Middleware for Authentication\r
```typescript\r
// middleware.ts\r
import { NextResponse } from 'next/server';\r
import type { NextRequest } from 'next/server';\r
\r
export function middleware(request: NextRequest) {\r
  const token = request.cookies.get('auth-token');\r
  \r
  if (!token && request.nextUrl.pathname.startsWith('/dashboard')) {\r
    return NextResponse.redirect(new URL('/login', request.url));\r
  }\r
  \r
  return NextResponse.next();\r
}\r
\r
export const config = {\r
  matcher: '/dashboard/:path*',\r
};\r
```\r
\r
## Migration Strategies\r
\r
### Pages Router to App Router Migration\r
1. **Gradual Migration**: Use both routers simultaneously\r
2. **Layout Conversion**: Transform `_app.js` to `layout.tsx`\r
3. **API Routes**: Move from `pages/api/` to `app/api/*/route.ts`\r
4. **Data Fetching**: Convert `getServerSideProps` to Server Components\r
5. **Client Components**: Add 'use client' directive where needed\r
\r
### Data Fetching Migration\r
```typescript\r
// Before (Pages Router)\r
export async function getServerSideProps(context) {\r
  const data = await fetchData(context.params.id);\r
  return { props: { data } };\r
}\r
\r
// After (App Router)\r
async function Page({ params }: { params: { id: string } }) {\r
  const data = await fetchData(params.id);\r
  return <ComponentWithData data={data} />;\r
}\r
```\r
\r
## Architecture Decision Framework\r
\r
When architecting Next.js applications, consider:\r
\r
1. **Rendering Strategy**\r
   - Static: Known content, high performance needs\r
   - Server: Dynamic content, SEO requirements\r
   - Client: Interactive features, real-time updates\r
\r
2. **Data Fetching Pattern**\r
   - Server Components: Direct database access\r
   - Client Components: SWR/React Query for caching\r
   - API Routes: External API integration\r
\r
3. **Performance Requirements**\r
   - Static generation for marketing pages\r
   - ISR for frequently changing content\r
   - Streaming for slow queries\r
\r
Always provide specific architectural recommendations based on project requirements, performance constraints, and team expertise level."""
