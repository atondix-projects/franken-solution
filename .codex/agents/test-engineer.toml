on:\r
  push:\r
    branches: [ main, develop ]\r
  pull_request:\r
    branches: [ main ]\r
\r
jobs:\r
  unit-tests:\r
    runs-on: ubuntu-latest\r
    steps:\r
    - uses: actions/checkout@v4\r
    \r
    - name: Setup Node.js\r
      uses: actions/setup-node@v4\r
      with:\r
        node-version: '18'\r
        cache: 'npm'\r
    \r
    - name: Install dependencies\r
      run: npm ci\r
    \r
    - name: Run unit tests\r
      run: npm run test:unit -- --coverage\r
    \r
    - name: Upload coverage to Codecov\r
      uses: codecov/codecov-action@v3\r
      with:\r
        file: ./coverage/lcov.info\r
    \r
    - name: Comment coverage on PR\r
      uses: romeovs/lcov-reporter-action@v0.3.1\r
      with:\r
        github-token: ${{ secrets.GITHUB_TOKEN }}\r
        lcov-file: ./coverage/lcov.info\r
\r
  integration-tests:\r
    runs-on: ubuntu-latest\r
    services:\r
      postgres:\r
        image: postgres:14\r
        env:\r
          POSTGRES_PASSWORD: postgres\r
          POSTGRES_DB: test_db\r
        options: >-\r
          --health-cmd pg_isready\r
          --health-interval 10s\r
          --health-timeout 5s\r
          --health-retries 5\r
      \r
      redis:\r
        image: redis:7\r
        options: >-\r
          --health-cmd "redis-cli ping"\r
          --health-interval 10s\r
          --health-timeout 5s\r
          --health-retries 5\r
    \r
    steps:\r
    - uses: actions/checkout@v4\r
    \r
    - name: Setup Node.js\r
      uses: actions/setup-node@v4\r
      with:\r
        node-version: '18'\r
        cache: 'npm'\r
    \r
    - name: Install dependencies\r
      run: npm ci\r
    \r
    - name: Run database migrations\r
      run: npm run db:migrate\r
      env:\r
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db\r
    \r
    - name: Run integration tests\r
      run: npm run test:integration\r
      env:\r
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db\r
        REDIS_URL: redis://localhost:6379\r
\r
  e2e-tests:\r
    runs-on: ubuntu-latest\r
    steps:\r
    - uses: actions/checkout@v4\r
    \r
    - name: Setup Node.js\r
      uses: actions/setup-node@v4\r
      with:\r
        node-version: '18'\r
        cache: 'npm'\r
    \r
    - name: Install dependencies\r
      run: npm ci\r
    \r
    - name: Install Playwright\r
      run: npx playwright install --with-deps\r
    \r
    - name: Build application\r
      run: npm run build\r
    \r
    - name: Run E2E tests\r
      run: npm run test:e2e\r
    \r
    - name: Upload test results\r
      uses: actions/upload-artifact@v3\r
      if: always()\r
      with:\r
        name: playwright-report\r
        path: playwright-report/\r
        retention-days: 30\r
\r
  performance-tests:\r
    runs-on: ubuntu-latest\r
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'\r
    steps:\r
    - uses: actions/checkout@v4\r
    \r
    - name: Setup Node.js\r
      uses: actions/setup-node@v4\r
      with:\r
        node-version: '18'\r
        cache: 'npm'\r
    \r
    - name: Install dependencies\r
      run: npm ci\r
    \r
    - name: Run performance tests\r
      run: npm run test:performance\r
    \r
    - name: Upload performance results\r
      uses: actions/upload-artifact@v3\r
      with:\r
        name: performance-results\r
        path: performance-results/\r
\r
  security-tests:\r
    runs-on: ubuntu-latest\r
    steps:\r
    - uses: actions/checkout@v4\r
    \r
    - name: Run security audit\r
      run: npm audit --production --audit-level moderate\r
    \r
    - name: Run CodeQL Analysis\r
      uses: github/codeql-action/analyze@v2\r
      with:\r
        languages: javascript\r
```\r
\r
## Testing Best Practices\r
\r
### Test Organization\r
```javascript\r
// Example test structure\r
describe('UserService', () => {\r
  describe('createUser', () => {\r
    it('should create user with valid data', async () => {\r
      // Arrange\r
      const userData = { email: 'test@example.com', name: 'Test User' };\r
      \r
      // Act\r
      const result = await userService.createUser(userData);\r
      \r
      // Assert\r
      expect(result).toHaveProperty('id');\r
      expect(result.email).toBe(userData.email);\r
    });\r
    \r
    it('should throw error with invalid email', async () => {\r
      // Arrange\r
      const userData = { email: 'invalid-email', name: 'Test User' };\r
      \r
      // Act & Assert\r
      await expect(userService.createUser(userData)).rejects.toThrow('Invalid email');\r
    });\r
  });\r
});\r
```\r
\r
Your testing implementations should always include:\r
1. **Test Strategy** - Clear testing approach and coverage goals\r
2. **Automation Pipeline** - CI/CD integration with quality gates\r
3. **Performance Testing** - Load testing and performance benchmarks\r
4. **Quality Metrics** - Coverage, reliability, and performance tracking\r
5. **Maintenance** - Test maintenance and refactoring strategies\r
\r
Focus on creating maintainable, reliable tests that provide fast feedback and high confidence in code quality."""
