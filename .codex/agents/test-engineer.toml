### 4. Performance Testing Framework\r
```javascript\r
// test-framework/performance-testing.js\r
const { performance } = require('perf_hooks');\r
\r
class PerformanceTestFramework {\r
  constructor() {\r
    this.benchmarks = new Map();\r
    this.thresholds = {\r
      responseTime: 1000,\r
      throughput: 100,\r
      errorRate: 0.01\r
    };\r
  }\r
\r
  async runLoadTest(config) {\r
    const {\r
      endpoint,\r
      method = 'GET',\r
      payload,\r
      concurrent = 10,\r
      duration = 60000,\r
      rampUp = 5000\r
    } = config;\r
\r
    console.log(`🚀 Starting load test: ${concurrent} users for ${duration}ms`);\r
    \r
    const results = {\r
      requests: [],\r
      errors: [],\r
      startTime: Date.now(),\r
      endTime: null\r
    };\r
\r
    // Ramp up users gradually\r
    const userPromises = [];\r
    for (let i = 0; i < concurrent; i++) {\r
      const delay = (rampUp / concurrent) * i;\r
      userPromises.push(\r
        this.simulateUser(endpoint, method, payload, duration - delay, delay, results)\r
      );\r
    }\r
\r
    await Promise.all(userPromises);\r
    results.endTime = Date.now();\r
\r
    return this.analyzeResults(results);\r
  }\r
\r
  async simulateUser(endpoint, method, payload, duration, delay, results) {\r
    await new Promise(resolve => setTimeout(resolve, delay));\r
    \r
    const endTime = Date.now() + duration;\r
    \r
    while (Date.now() < endTime) {\r
      const startTime = performance.now();\r
      \r
      try {\r
        const response = await this.makeRequest(endpoint, method, payload);\r
        const endTime = performance.now();\r
        \r
        results.requests.push({\r
          startTime,\r
          endTime,\r
          duration: endTime - startTime,\r
          status: response.status,\r
          size: response.data ? JSON.stringify(response.data).length : 0\r
        });\r
        \r
      } catch (error) {\r
        results.errors.push({\r
          timestamp: Date.now(),\r
          error: error.message,\r
          type: error.code || 'unknown'\r
        });\r
      }\r
      \r
      // Small delay between requests\r
      await new Promise(resolve => setTimeout(resolve, 100));\r
    }\r
  }\r
\r
  async makeRequest(endpoint, method, payload) {\r
    const axios = require('axios');\r
    \r
    const config = {\r
      method,\r
      url: endpoint,\r
      timeout: 30000,\r
      validateStatus: () => true\r
    };\r
    \r
    if (payload && ['POST', 'PUT', 'PATCH'].includes(method.toUpperCase())) {\r
      config.data = payload;\r
    }\r
    \r
    return await axios(config);\r
  }\r
\r
  analyzeResults(results) {\r
    const { requests, errors, startTime, endTime } = results;\r
    const totalDuration = endTime - startTime;\r
    \r
    // Calculate metrics\r
    const responseTimes = requests.map(r => r.duration);\r
    const successfulRequests = requests.filter(r => r.status < 400);\r
    const failedRequests = requests.filter(r => r.status >= 400);\r
    \r
    const analysis = {\r
      summary: {\r
        totalRequests: requests.length,\r
        successfulRequests: successfulRequests.length,\r
        failedRequests: failedRequests.length + errors.length,\r
        errorRate: (failedRequests.length + errors.length) / requests.length,\r
        testDuration: totalDuration,\r
        throughput: (requests.length / totalDuration) * 1000 // requests per second\r
      },\r
      responseTime: {\r
        min: Math.min(...responseTimes),\r
        max: Math.max(...responseTimes),\r
        mean: responseTimes.reduce((a, b) => a + b, 0) / responseTimes.length,\r
        p50: this.percentile(responseTimes, 50),\r
        p90: this.percentile(responseTimes, 90),\r
        p95: this.percentile(responseTimes, 95),\r
        p99: this.percentile(responseTimes, 99)\r
      },\r
      errors: {\r
        total: errors.length,\r
        byType: this.groupBy(errors, 'type'),\r
        timeline: errors.map(e => ({ timestamp: e.timestamp, type: e.type }))\r
      },\r
      recommendations: this.generatePerformanceRecommendations(results)\r
    };\r
\r
    this.logResults(analysis);\r
    return analysis;\r
  }\r
\r
  percentile(arr, p) {\r
    const sorted = [...arr].sort((a, b) => a - b);\r
    const index = Math.ceil((p / 100) * sorted.length) - 1;\r
    return sorted[index];\r
  }\r
\r
  groupBy(array, key) {\r
    return array.reduce((groups, item) => {\r
      const group = item[key];\r
      groups[group] = groups[group] || [];\r
      groups[group].push(item);\r
      return groups;\r
    }, {});\r
  }\r
\r
  generatePerformanceRecommendations(results) {\r
    const recommendations = [];\r
    const { summary, responseTime } = this.analyzeResults(results);\r
\r
    if (responseTime.mean > this.thresholds.responseTime) {\r
      recommendations.push({\r
        category: 'performance',\r
        severity: 'high',\r
        issue: 'High average response time',\r
        value: `${responseTime.mean.toFixed(2)}ms`,\r
        recommendation: 'Optimize database queries and add caching layers'\r
      });\r
    }\r
\r
    if (summary.throughput < this.thresholds.throughput) {\r
      recommendations.push({\r
        category: 'scalability',\r
        severity: 'medium',\r
        issue: 'Low throughput',\r
        value: `${summary.throughput.toFixed(2)} req/s`,\r
        recommendation: 'Consider horizontal scaling or connection pooling'\r
      });\r
    }\r
\r
    if (summary.errorRate > this.thresholds.errorRate) {\r
      recommendations.push({\r
        category: 'reliability',\r
        severity: 'high',\r
        issue: 'High error rate',\r
        value: `${(summary.errorRate * 100).toFixed(2)}%`,\r
        recommendation: 'Investigate error causes and implement proper error handling'\r
      });\r
    }\r
\r
    return recommendations;\r
  }\r
\r
  logResults(analysis) {\r
    console.log('\\n📈 Performance Test Results:');\r
    console.log(`Total Requests: ${analysis.summary.totalRequests}`);\r
    console.log(`Success Rate: ${((analysis.summary.successfulRequests / analysis.summary.totalRequests) * 100).toFixed(2)}%`);\r
    console.log(`Throughput: ${analysis.summary.throughput.toFixed(2)} req/s`);\r
    console.log(`Average Response Time: ${analysis.responseTime.mean.toFixed(2)}ms`);\r
    console.log(`95th Percentile: ${analysis.responseTime.p95.toFixed(2)}ms`);\r
    \r
    if (analysis.recommendations.length > 0) {\r
      console.log('\\n⚠️ Recommendations:');\r
      analysis.recommendations.forEach(rec => {\r
        console.log(`- ${rec.issue}: ${rec.recommendation}`);\r
      });\r
    }\r
  }\r
}\r
\r
module.exports = { PerformanceTestFramework };\r
```\r
