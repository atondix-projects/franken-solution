### 2. Advanced Test Patterns and Utilities\r
```javascript\r
// test-framework/test-patterns.js\r
\r
class TestPatterns {\r
  // Page Object Model for E2E tests\r
  static createPageObject(page, selectors) {\r
    const pageObject = {};\r
    \r
    Object.entries(selectors).forEach(([name, selector]) => {\r
      pageObject[name] = {\r
        element: () => page.locator(selector),\r
        click: () => page.click(selector),\r
        fill: (text) => page.fill(selector, text),\r
        getText: () => page.textContent(selector),\r
        isVisible: () => page.isVisible(selector),\r
        waitFor: (options) => page.waitForSelector(selector, options)\r
      };\r
    });\r
    \r
    return pageObject;\r
  }\r
\r
  // Test data factory\r
  static createTestDataFactory(schema) {\r
    return {\r
      build: (overrides = {}) => {\r
        const data = {};\r
        \r
        Object.entries(schema).forEach(([key, generator]) => {\r
          if (overrides[key] !== undefined) {\r
            data[key] = overrides[key];\r
          } else if (typeof generator === 'function') {\r
            data[key] = generator();\r
          } else {\r
            data[key] = generator;\r
          }\r
        });\r
        \r
        return data;\r
      },\r
      \r
      buildList: (count, overrides = {}) => {\r
        return Array.from({ length: count }, (_, index) => \r
          this.build({ ...overrides, id: index + 1 })\r
        );\r
      }\r
    };\r
  }\r
\r
  // Mock service factory\r
  static createMockService(serviceName, methods) {\r
    const mock = {};\r
    \r
    methods.forEach(method => {\r
      mock[method] = jest.fn();\r
    });\r
    \r
    mock.reset = () => {\r
      methods.forEach(method => {\r
        mock[method].mockReset();\r
      });\r
    };\r
    \r
    mock.restore = () => {\r
      methods.forEach(method => {\r
        mock[method].mockRestore();\r
      });\r
    };\r
    \r
    return mock;\r
  }\r
\r
  // Database test helpers\r
  static createDatabaseTestHelpers(db) {\r
    return {\r
      async cleanTables(tableNames) {\r
        for (const tableName of tableNames) {\r
          await db.query(`TRUNCATE TABLE ${tableName} RESTART IDENTITY CASCADE`);\r
        }\r
      },\r
      \r
      async seedTable(tableName, data) {\r
        if (Array.isArray(data)) {\r
          for (const row of data) {\r
            await db.query(`INSERT INTO ${tableName} (${Object.keys(row).join(', ')}) VALUES (${Object.keys(row).map((_, i) => `$${i + 1}`).join(', ')})`, Object.values(row));\r
          }\r
        } else {\r
          await db.query(`INSERT INTO ${tableName} (${Object.keys(data).join(', ')}) VALUES (${Object.keys(data).map((_, i) => `$${i + 1}`).join(', ')})`, Object.values(data));\r
        }\r
      },\r
      \r
      async getLastInserted(tableName) {\r
        const result = await db.query(`SELECT * FROM ${tableName} ORDER BY id DESC LIMIT 1`);\r
        return result.rows[0];\r
      }\r
    };\r
  }\r
\r
  // API test helpers\r
  static createAPITestHelpers(baseURL) {\r
    const axios = require('axios');\r
    \r
    const client = axios.create({\r
      baseURL,\r
      timeout: 10000,\r
      validateStatus: () => true // Don't throw on HTTP errors\r
    });\r
    \r
    return {\r
      async get(endpoint, options = {}) {\r
        return await client.get(endpoint, options);\r
      },\r
      \r
      async post(endpoint, data, options = {}) {\r
        return await client.post(endpoint, data, options);\r
      },\r
      \r
      async put(endpoint, data, options = {}) {\r
        return await client.put(endpoint, data, options);\r
      },\r
      \r
      async delete(endpoint, options = {}) {\r
        return await client.delete(endpoint, options);\r
      },\r
      \r
      withAuth(token) {\r
        client.defaults.headers.common['Authorization'] = `Bearer ${token}`;\r
        return this;\r
      },\r
      \r
      clearAuth() {\r
        delete client.defaults.headers.common['Authorization'];\r
        return this;\r
      }\r
    };\r
  }\r
}\r
\r
module.exports = { TestPatterns };\r
```\r
